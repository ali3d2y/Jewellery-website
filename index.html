    <style>
      header {
        margin-bottom: -10vh;

      .glass-search {
        background: rgba(255, 255, 255, 0.1);

      }

      .glass-search::placeholder {

      }

      .glass-search:focus {

        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {

          transform: translateY(0);
        }
      }

      button:hover .shimmer {

      }

          id="header-image"

              style="

        <div class="ml-10 flex-1">

              id="Search2"

        </div>
        <nav class="ml-10">

            </li>
            <li>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">

          <div class="relative w-full max-w-4xl mx-auto mb-8" style="margin-top: 10vh;">

                  <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=1200&h=600&fit=crop" alt="Girl wearing anti-tarnish necklace" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="carousel-slide" style="position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s ease-in-out;">
                  <img src="https://rosywine.in/cdn/shop/articles/669D808B-7433-440A-AEC9-CEAAA30D1958_6665a911-5b53-425a-856f-ce09ab94bb45.jpg?v=1727040885&width=1200" alt="Girl wearing anti-tarnish bracelet" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="carousel-slide" style="position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s ease-in-out;">
                  <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=1200&h=600&fit=crop" alt="Girl wearing anti-tarnish earrings" style="width: 100%; height: 100%; object-fit: cover;">

                </div>

                <!-- Previous Button -->
                <button id="carousel-prev" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(255, 255, 255, 0.3); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 24px; transition: background 0.3s; backdrop-filter: blur(5px);" onmouseover="this.style.background='rgba(255, 255, 255, 0.5)'" onmouseout="this.style.background='rgba(255, 255, 255, 0.3)'">
                  ❮
                </button>

                <!-- Next Button -->
                <button id="carousel-next" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(255, 255, 255, 0.3); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 24px; transition: background 0.3s; backdrop-filter: blur(5px);" onmouseover="this.style.background='rgba(255, 255, 255, 0.5)'" onmouseout="this.style.background='rgba(255, 255, 255, 0.3)'">

            </div>

            <!-- Carousel Indicators -->
            <div style="display: flex; justify-content: center; gap: 8px; margin-top: 16px;">
              <span class="carousel-indicator active" style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 255, 255, 0.6); cursor: pointer; transition: background 0.3s;"></span>
              <span class="carousel-indicator" style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); cursor: pointer; transition: background 0.3s;"></span>
              <span class="carousel-indicator" style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); cursor: pointer; transition: background 0.3s;"></span>
              <span class="carousel-indicator" style="width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); cursor: pointer; transition: background 0.3s;"></span>

          <a href="cart.html" id="cart-button-index">

                border-top: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 12px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                text-align: center;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
                cursor: pointer;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

                overflow: hidden;

              <span

                  top: 0;
                  left: -100%;

                  height: 100%;

                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.1),

                  pointer-events: none;

          <div

            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"

            <!-- Products will be loaded dynamically from JSON -->
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="bg-black text-white py-8">

        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

            <ul class="space-y-2">

          </div>
          <div>
            <h3 class="font-bold mb-4">Make Money with Us</h3>
            <ul class="space-y-2">
              <li><a href="#" class="hover:underline">Sell products</a></li>

          </div>
          <div>

        <div class="mt-8 pt-8 border-t border-gray-600 text-center">
          <p>&copy; 2023 NxtGen . All rights reserved.</p>

    <script src="/js/script.js"></script>
    <script>
      // Carousel functionality
      let currentSlide = 0;
      const slides = document.querySelectorAll('.carousel-slide');
      const indicators = document.querySelectorAll('.carousel-indicator');
      const totalSlides = slides.length;

      function showSlide(n) {
        slides.forEach(slide => slide.style.opacity = '0');
        indicators.forEach(ind => ind.style.background = 'rgba(255, 255, 255, 0.3)');
        
        slides[n].style.opacity = '1';
        indicators[n].style.background = 'rgba(255, 255, 255, 0.6)';
      }

      function nextSlide() {
        currentSlide = (currentSlide + 1) % totalSlides;
        showSlide(currentSlide);
      }

      function prevSlide() {
        currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
        showSlide(currentSlide);
      }

      document.getElementById('carousel-next').addEventListener('click', nextSlide);
      document.getElementById('carousel-prev').addEventListener('click', prevSlide);

      indicators.forEach((indicator, index) => {
        indicator.addEventListener('click', () => {
          currentSlide = index;
          showSlide(currentSlide);
        });
      });

      // Auto-advance carousel every 5 seconds
      setInterval(nextSlide, 5000);

      // Search functionality
      document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.getElementById("Search2");
        const carouselContainer = document.querySelector('.relative.w-full.max-w-4xl');

        // Hide carousel when user types in search box
        searchInput.addEventListener('input', (e) => {
          if (e.target.value.trim() !== '') {
            carouselContainer.style.display = 'none';
          } else {
            carouselContainer.style.display = 'block';
          }
        });

        const params = new URLSearchParams(window.location.search);
        const searchValue = params.get("search");
        if (!searchValue) return;

        const interval = setInterval(() => {
          const input = document.getElementById("Search2");
          if (!input) return;

          input.value = searchValue;
          input.focus();
          input.dispatchEvent(new Event("input", { bubbles: true }));
          input.dispatchEvent(
            new KeyboardEvent("keyup", { bubbles: true, key: "a" })
          );

          clearInterval(interval);
        }, 500);
      });
    </script>
  </body>
</html>
